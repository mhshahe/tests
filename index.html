<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العلوم المتكاملة · بنك أسئلة متقدم</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, 'Times New Roman', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f0f5fa 0%, #e6edf4 100%);
      min-height: 100vh;
      padding: 30px 20px;
      direction: rtl;
    }
    .master-container {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 30px 60px rgba(0, 30, 60, 0.2);
      overflow: hidden;
      padding: 25px 25px 35px 25px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      color: #0f3b5a;
      padding-right: 25px;
      border-right: 8px solid #1d7ca1;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
    }
    .sub {
      font-size: 1rem;
      color: #2d5779;
      padding-right: 33px;
      margin-bottom: 30px;
      font-style: italic;
    }
    /* ترويسة القسم */
    .section-header {
      padding: 16px 22px;
      border-radius: 50px;
      background: #1d7ca1;
      color: white;
      font-size: 1.7rem;
      font-weight: 700;
      margin: 35px 0 25px 0;
      display: inline-block;
      box-shadow: 0 6px 14px rgba(28, 110, 150, 0.4);
    }
    .section-header span {
      font-size: 1rem;
      background: #ffd966;
      color: #0e3e5c;
      padding: 4px 14px;
      border-radius: 40px;
      margin-right: 18px;
    }
    /* بطاقة السؤال */
    .q-grid {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .q-card {
      border-radius: 36px;
      padding: 22px 28px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      border: 2px solid transparent;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      backdrop-filter: blur(2px);
    }
    .q-card:hover {
      transform: scale(1.01) translateY(-4px);
      border-color: #ffffff;
      box-shadow: 0 20px 30px rgba(0, 60, 100, 0.25);
    }
    /* ألوان مختلفة للأقسام */
    .exam-a { background: #e3f0fd; }  /* أزرق فاتح */
    .exam-b { background: #e0f5e8; }  /* أخضر فاتح */
    .exam-c { background: #fff2cf; }  /* أصفر فاتح */
    .bank   { background: #f8e9f0; }  /* زهري فاتح */

    .q-num {
      display: inline-block;
      background: rgba(0,0,0,0.06);
      padding: 5px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: #1d4663;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .q-text {
      font-size: 1.15rem;
      font-weight: 500;
      color: #02263c;
      margin-bottom: 22px;
      line-height: 1.6;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    .opt {
      display: flex;
      align-items: baseline;
      gap: 15px;
      background: rgba(255,255,255,0.6);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1.05rem;
      color: #103e5c;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
    }
    .opt-letter {
      background: #2d7096;
      color: white;
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 700;
      flex-shrink: 0;
    }
    .hint-btn {
      background: transparent;
      border: 2px dashed #236d97;
      color: #1b577b;
      font-weight: 600;
      padding: 14px 25px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      width: fit-content;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }
    .hint-btn:hover {
      background: #236d97;
      color: white;
      border: 2px solid #236d97;
    }
    .explain-box {
      background: #fafffe;
      border-right: 6px solid #1b7a56;
      padding: 20px 28px;
      border-radius: 30px;
      margin-top: 22px;
      font-size: 1rem;
      color: #02422b;
      line-height: 1.8;
      display: none;
      box-shadow: inset 0 0 0 1px #bbdfce;
    }
    .explain-box.show {
      display: block;
    }
    .correct-tag {
      background: #147a56;
      color: white;
      padding: 5px 18px;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 12px;
      font-weight: 600;
    }
    /* زر التقييم */
    .eval-area {
      margin: 50px 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .eval-btn {
      background: #1a4863;
      border: none;
      color: white;
      padding: 18px 42px;
      border-radius: 70px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px #0d3b4f;
      transition: 0.2s;
    }
    .eval-btn:hover {
      background: #0d3b4f;
      transform: scale(1.02);
    }
    .eval-result {
      background: #10344a;
      color: #eefbff;
      padding: 18px 32px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 600;
      text-align: center;
    }
    .footer {
      margin-top: 60px;
      text-align: center;
      color: #1a4e6e;
      border-top: 2px solid #bed9ec;
      padding-top: 30px;
      font-size: 1.1rem;
    }
    .footer strong {
      color: #0b3047;
    }
  </style>
</head>
<body>
<div class="master-container">
  <h1>🧪 العلوم المتكاملة <br><span style="font-size: 1.3rem;">الامتحانات الشاملة + بنك الـ 50 سؤالاً</span></h1>
  <div class="sub"> ⚡ نماذج مطابقة لمواصفات الثانوية العامة (الصف الأول الثانوي – الفصل الثاني)</div>

  <div id="questionsArea" class="q-grid"></div>

  <div class="eval-area">
    <button class="eval-btn" onclick="calculatePerformance()">📊 تقييم أدائي</button>
    <div id="performanceDisplay" class="eval-result">أنتظر تقييمك...</div>
  </div>

  <div class="footer">
    <p>✧ أُعد بعناية بواسطة ✧<br>
    <strong>مهندس محمد محمود شاهين</strong><br>
    بإهداء إلى الطالب <span style="color:#ad7d3d;">عبد الرحمن محمد محمود شاهين</span></p>
  </div>
</div>

<script>
// ---------- بيانات الأسئلة (80 سؤالاً) ----------
const questions = [
  // ========== الامتحان A ==========
  { section: "A", q: "أي من المركبات التالية تُمثل 'عملة الطاقة' المباشرة التي تستخدمها الخلية لإتمام أنشطتها الحيوية؟",
    opts: ["أ) الجلوكوز.", "ب) الجليكوجين.", "ج) ATP.", "د) النشا."], correct: "ج", 
    exp: "ATP هو المصدر المباشر للطاقة في الخلايا؛ حيث يتم تحرير الطاقة عند كسر الرابطة بين الفوسفات الثانية والثالثة." },
  { section: "A", q: "عند دراسة حركة الدم في الجهاز الدوري، أي الحجرات القلبية التالية تتحمل الجهد الأكبر لدفع الدم الغني بالأكسجين إلى أبعد نقطة في الجسم؟",
    opts: ["أ) الأذين الأيمن.", "ب) البطين الأيمن.", "ج) الأذين الأيسر.", "د) البطين الأيسر."], correct: "د",
    exp: "البطين الأيسر يضخ الدم المحمل بالأكسجين عبر الشريان الأورطي إلى جميع أجزاء الجسم، لذا جداره العضلي هو الأكثر سمكاً." },
  { section: "A", q: "إذا تعرض نبات لفقاعة هوائية كبيرة داخل أحد أوعية الخشب، فإن التأثير المباشر والأسرع لذلك هو:",
    opts: ["أ) توقف نقل السكريات من الأوراق للجذور.", "ب) انقطاع عمود الماء وتوقف قوى التماسك في هذا الوعاء.", "ج) زيادة معدل البناء الضوئي لتعويض الفاقد.", "د) تحفيز قوى التلاصق لسحب الماء بدلاً من التماسك."], correct: "ب",
    exp: "الخشب يعتمد على خاصية التماسك بين جزيئات الماء (روابط هيدروجينية)؛ الفقاعة تقطع العمود وتمنع صعود الماء." },
  { section: "A", q: "رياضي يمارس رياضة رفع الأثقال العنيفة. بعد انتهاء التدريب، شعر بإجهاد عضلي شديد. السبب الكيميائي الدقيق لهذا الإجهاد هو:",
    opts: ["أ) تراكم حمض اللاكتيك نتيجة التنفس اللاهوائي في غياب الأكسجين.", "ب) تراكم الكحول الإيثيلي نتيجة التخمر الكحلي.", "ج) استهلاك كامل جزيئات ATP المتاحة وتوقف التنفس الهوائي.", "د) زيادة نسبة غاز ثاني أكسيد الكربون في العضلات."], correct: "أ",
    exp: "عند نقص الأكسجين، تتحول العضلات للتنفس اللاهوائي منتجة حمض اللاكتيك الذي يسبب الإجهاد والتعب." },
  { section: "A", q: "إذا علمت أن المحتوى الحراري لمتفاعلات تفاعل ما (مثل احتراق الميثانول) أعلى من المحتوى الحراري لنواتجه، فإن التغير في المحتوى الحراري (∆H) وإشارة التفاعل تكون:",
    opts: ["أ) موجبة، والتفاعل ماص للحرارة.", "ب) سالبة، والتفاعل طارد للحرارة.", "ج) موجبة، والتفاعل طارد للحرارة.", "د) سالبة، والتفاعل ماص للحرارة."], correct: "ب",
    exp: "∆H = طاقة النواتج - طاقة المتفاعلات. إذا كانت النواتج أقل طاقة، يكون ∆H سالباً والتفاعل طارداً للحرارة." },
  { section: "A", q: "يعاني مريض من نقص شديد في كمية الماء بالدم (جفاف)، مما أدى إلى ارتفاع ضغط دمه. التفسير الفيزيائي الدقيق لذلك هو:",
    opts: ["أ) انخفاض مرونة الأوعية الدموية.", "ب) نقص عدد خلايا الدم الحمراء.", "ج) زيادة تركيز الذائبات مما رفع لزوجة الدم وزاد مقاومته للتدفق.", "د) انخفاض كثافة الدم مما تطلب قوة ضخ أقل."], correct: "ج",
    exp: "الجفاف يزيد تركيز المواد الذائبة في الدم مما يرفع لزوجته، وبالتالي ترتفع مقاومة التدفق ويرتفع الضغط." },
  { section: "A", q: "بناءً على قانون بقاء الطاقة في الشبكات الغذائية، إذا كان مستوى المنتجات يحتوي على 100,000 وحدة طاقة، فإن الطاقة التقريبية التي تصل إلى المستهلك الثانوي (آكلات اللحوم الأولى) هي:",
    opts: ["أ) 10,000 وحدة.", "ب) 1,000 وحدة.", "ج) 100 وحدة.", "د) 10 وحدات."], correct: "ب",
    exp: "عند الانتقال من مستوى غذائي للآخر يُفقد 90% من الطاقة. المنتجات 100,000 → مستهلك أول 10,000 → مستهلك ثانوي 1,000." },
  { section: "A", q: "عند استخدام تقنية 'كريسبر-كاس9' (CRISPR-Cas9) لعلاج فقر الدم المنجلي، فإن التعديل الجزيئي يتم أساسًا على مستوى:",
    opts: ["أ) القواعد النيتروجينية في الحمض النووي DNA.", "ب) الروابط الببتيدية في البروتينات.", "ج) السكر الخماسي في الحمض النووي RNA.", "د) الفوسفوليبيدات في الغشاء الخلوي."], correct: "أ",
    exp: "كريسبر هو نظام تعديل جيني يعمل على قطع وتحرير تسلسل DNA (القواعد النيتروجينية) بدقة." },
  { section: "A", q: "تعرضت صخور تحتوي على معدن الكالسيت (CaCO₃) لأمطار محملة بغاز ثاني أكسيد الكربون لفترات طويلة. النتيجة الجيولوجية المتوقعة هي:",
    opts: ["أ) تحول الكالسيت إلى كوارتز شديد الصلابة.", "ب) تفكك الروابط الأيونية وتكوين بيكربونات الكالسيوم الذائبة محدثة تجاويف.", "ج) زيادة صلابة الصخر بسبب التجوية الميكانيكية.", "د) عدم تأثر الصخر لأن الروابط الأيونية تقاوم الأحماض الضعيفة."], correct: "ب",
    exp: "يتفاعل CO₂ مع ماء المطر مكوناً حمض الكربونيك الذي يذيب كربونات الكالسيوم (الكالسيت) مكوناً بيكربونات الكالسيوم الذائبة، مسبباً الكهوف." },
  { section: "A", q: "من التطبيقات النانوية الحديثة استخدام 'النقاط الكمومية' (Quantum Dots). تُصنف هذه المواد هندسيًا على أنها:",
    opts: ["أ) مواد أحادية البعد النانوي.", "ب) مواد ثنائية الأبعاد النانوية.", "ج) مواد ثلاثية الأبعاد النانوية.", "د) مواد صفرية الأبعاد النانوية."], correct: "د",
    exp: "النقاط الكمومية جسيمات نانوية متناهية الصغر محصورة في الأبعاد الثلاثة، لذا تصنف 0D." },

  // ========== الامتحان B ==========
  { section: "B", q: "أي من طبقات الأرض التالية تولد المجال المغناطيسي الذي يحمي الكوكب من الأشعة الكونية؟",
    opts: ["أ) القشرة القارية.", "ب) الوشاح العلوي.", "ج) اللب الخارجي.", "د) اللب الداخلي."], correct: "ج",
    exp: "اللب الخارجي (الحديد والنيكل المنصهر) وحركته يولدان تأثير الدينامو المسؤول عن المجال المغناطيسي الأرضي." },
  { section: "B", q: "أي الجزيئات البيولوجية التالية يحتوي على عناصر الكربون والهيدروجين والأكسجين والنيتروجين، وأحيانًا الكبريت؟",
    opts: ["أ) الكربوهيدرات.", "ب) الليبيدات.", "ج) البروتينات.", "د) الأحماض النووية."], correct: "ج",
    exp: "البروتينات مكونة من أحماض أمينية تحتوي C, H, O, N، وبعضها يحتوي كبريت (مثل الميثيونين)." },
  { section: "B", q: "في تجربة لتوضيح معدل التنفس الخلوي في البذور المنبتة، لوحظ أن تعكر ماء الجير الرائق يكون أسرع في درجة حرارة الغرفة (25 مئوية) مقارنة بالثلاجة. التفسير الأقرب لذلك هو:",
    opts: ["أ) نقص الأكسجين في الثلاجة.", "ب) زيادة نشاط الإنزيمات المسؤولة عن التنفس الخلوي في الدرجة المعتدلة.", "ج) تحول التنفس الهوائي إلى تخمر كحلي في درجة حرارة الغرفة.", "د) انخفاض معدل البناء الضوئي في الثلاجة."], correct: "ب",
    exp: "الإنزيمات التنفسية تعمل بنشاط أكبر في درجة حرارة مناسبة (الغرفة)، مما يزيد إنتاج CO₂ فيعكر ماء الجير أسرع." },
  { section: "B", q: "عند وصول السيال العصبي إلى التشابك العصبي العضلي، يعمل إنزيم 'الكولين إستيريز' على:",
    opts: ["أ) زيادة نفاذية غشاء الخلية لأيونات الصوديوم.", "ب) تكسير الناقل العصبي (الأستيل كولين) لعودة الغشاء لحالة الراحة.", "ج) ضخ أيونات البوتاسيوم لداخل الخلية.", "د) تحفيز إفراز المزيد من النواقل العصبية."], correct: "ب",
    exp: "الكولين إستيريز يحلل الأستيل كولين بعد إتمام الرسالة حتى لا يظل منشطاً، فيعود الغشاء لوضع الراحة." },
  { section: "B", q: "أي من الأشكال التالية للتغذية يساهم بشكل مباشر في إزالة غاز CO₂ من الغلاف الجوي وتخزينه كطاقة كيميائية؟",
    opts: ["أ) الكائنات المحللة (البكتيريا والفطريات).", "ب) المستهلكات الأولية (آكلات العشب).", "ج) الكائنات ذاتية التغذية (المنتجات).", "د) المستهلكات الثانوية (آكلات اللحوم)."], correct: "ج",
    exp: "البناء الضوئي تقوم به النباتات (منتجات) حيث تمتص CO₂ وتثبته في صورة مركبات عضوية (سكريات)." },
  { section: "B", q: "مريض يعاني من فشل في إعادة امتصاص أيونات الصوديوم والجلوكوز في الكليتين (نفرون). ما الأثر المتوقع لذلك على 'الاتزان الداخلي' (Homeostasis)؟",
    opts: ["أ) زيادة حجم الدم وارتفاع ضغط الدم.", "ب) نقص الجلوكوز المتاح للخلايا واضطراب الضغط الأسموزي.", "ج) ارتفاع درجة حرارة الجسم لتعويض نقص الطاقة.", "د) توقف عملية التنفس الخلوي اللاهوائي في العضلات."], correct: "ب",
    exp: "فقدان الجلوكوز بالبول يحرم الخلايا من الطاقة، وفقدان الصوديوم يخل بالضغط الأسموزي وحجم السوائل." },
  { section: "B", q: "عند مقارنة الطول الموجي للمجهر الإلكتروني بالمجهر الضوئي، نجد أن:",
    opts: ["أ) الطول الموجي للإلكترون أطول، مما يقلل قوة التكبير.", "ب) الطول الموجي للإلكترون أقصر، مما يتيح رؤية تراكيب دقيقة مثل بروتينات الغشاء.", "ج) الطول الموجي متساوٍ، ولكن الإلكترونات أكثر إضاءة.", "د) الطول الموجي للإلكترون أقصر، مما يمنع رؤية الفوسفوليبيدات."], correct: "ب",
    exp: "الإلكترونات لها طول موجي قصير جداً (حوالي 0.004 نانومتر) ما يعطي قوة تحليل عالية لرؤية التفاصيل الدقيقة." },
  { section: "B", q: "في دورة الصخور، إذا تعرضت صخور الحجر الجيري الرسوبية لضغط وحرارة شديدين بمرور الزمن، فإنها تتحول إلى:",
    opts: ["أ) صخور نارية.", "ب) صخور رسوبية فتاتية.", "ج) صخور متحولة (رخام).", "د) ماجما منصهرة."], correct: "ج",
    exp: "الحجر الجيري (رسوبي) تحت الضغط والحرارة يتحول إلى رخام (صخر متحول)." },
  { section: "B", q: "يتميز معدن 'الميكا' فيزيائيًا بأنه يظهر:",
    opts: ["أ) انفصامًا في اتجاه واحد (رقائق).", "ب) تكسرًا صدفيًا دون انفصام واضح.", "ج) صالدة تصل إلى 10 على مقياس موهس.", "د) تفاعلاً قويًا وفورانًا مع الأحماض المخففة."], correct: "أ",

let totalQuestions = questions.length;
let revealed = new Array(totalQuestions).fill(false);

// عرض الأسئلة
function renderQuestions() {
  let container = document.getElementById('questionsArea');
  let html = '';

  // دالة مساعدة لتحديد كلاس القسم
  function sectionClass(section) {
    if (section === 'A') return 'exam-a';
    if (section === 'B') return 'exam-b';
    if (section === 'C') return 'exam-c';
    return 'bank';
  }

  for (let i = 0; i < questions.length; i++) {
    let q = questions[i];
    let optsHtml = '';
    q.opts.forEach(opt => {
      optsHtml += `<div class="opt"><span class="opt-letter">${opt.charAt(0)}</span> ${opt}</div>`;
    });

    let sectionLabel = '';
    if (i === 0) sectionLabel = '<div class="section-header">📘 الامتحان التجريبي A <span>10 أسئلة</span></div>';
    else if (i === 10) sectionLabel = '<div class="section-header">📗 الامتحان التجريبي B <span>10 أسئلة</span></div>';
    else if (i === 20) sectionLabel = '<div class="section-header">📙 الامتحان التجريبي C <span>10 أسئلة</span></div>';
    else if (i === 30) sectionLabel = '<div class="section-header">🧬 بنك الأسئلة المتقدم <span>50 سؤالاً (نموذج)</span></div>';

    html += sectionLabel + `
      <div class="q-card ${sectionClass(q.section)}" data-index="${i}">
        <div class="q-num">سؤال ${i+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHtml}</div>
        <button class="hint-btn" onclick="toggleHint(${i})">💡 تلميح / شرح</button>
        <div id="hint-${i}" class="explain-box"> <span class="correct-tag">✔ الإجابة الصحيحة: ${q.correct}</span> <br> ${q.exp}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function toggleHint(idx) {
  let box = document.getElementById('hint-'+idx);
  if (!revealed[idx]) {
    revealed[idx] = true;  // سجل أول مشاهدة
  }
  box.classList.toggle('show');
}

function calculatePerformance() {
  let viewed = revealed.filter(v => v === true).length;
  let percent = (viewed / totalQuestions) * 100;
  let level = '';
  if (percent >= 80) level = 'ممتاز ⭐';
  else if (percent >= 60) level = 'جيد جداً 🌟';
  else if (percent >= 40) level = 'جيد ✨';
  else level = 'يحتاج مراجعة 📘';

  document.getElementById('performanceDisplay').innerHTML = `تمت مراجعة ${viewed} من ${totalQuestions} أسئلة (${percent.toFixed(1)}%) <br> المستوى: ${level}`;
}

window.onload = function() {
  renderQuestions();
};
</script>
</body>
</html>
