let shownHints = new Array(questions.length).fill(false);

function renderQuestions() {
    let container = document.getElementById('questionsArea');
    let html = '';
    questions.forEach((q, idx) => {
        let optsHtml = '';
        q.opts.forEach(opt => {
            let letter = opt.charAt(0);
            optsHtml += `<div class="opt"><span class="opt-letter">${letter}</span> ${opt}</div>`;
        });
        html += `
        <div class="q-card">
            <div class="q-num">سؤال ${idx+1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">${optsHtml}</div>
            <button class="hint-btn" onclick="toggleHint(${idx})">💡 تلميح / شرح</button>
            <div id="hint-${idx}" class="explanation"><span class="correct-tag">✔ الإجابة الصحيحة: ${q.correct}</span><br>${q.exp}</div>
        </div>
        `;
    });
    container.innerHTML = html;
}

function toggleHint(index) {
    let el = document.getElementById('hint-'+index);
    if (el) {
        el.classList.toggle('show');
        shownHints[index] = true;
    }
}

window.onload = renderQuestions;
